<svg viewBox="0 0 980 510" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Hanken Grotesk',system-ui,sans-serif">
  <title>Many apps, one Switchboard — which holds your data, context and inference; Claude reaches your tools</title>
  <desc>Many small apps point their arrows at one Switchboard. Switchboard holds three things you own: your data, your context, and your inference. Inference is served by Claude or by local models on your machine. Claude, in turn, is connected to your tools and connectors. Apps borrow the whole stack under consent; nothing runs on the operator's bill.</desc>
  <style>
    .h{fill:#E8EDF4;font-weight:700}
    .t{fill:#E8EDF4;font-weight:600}
    .dim{fill:#99A3B7;font-weight:500}
    .faint{fill:#6E7C90;font-weight:500}
    .lime{fill:#C8F250}
    .ink{fill:#0A0C10;font-weight:700}
    .mono{font-family:'Spline Sans Mono',ui-monospace,monospace}
    .disp{font-family:'Bricolage Grotesque',sans-serif}
    .app{fill:#12151C;stroke:#262C38;stroke-width:1}
    .box{fill:#12151C;stroke:#262C38;stroke-width:1}
    .infer{fill:#0E1116;stroke:#C8F250;stroke-width:1.4}
    .pill{fill:#1A1F29;stroke:#2C3444;stroke-width:1}
    .ain{stroke:#6E7C90;stroke-width:1.5;fill:none;marker-end:url(#ah)}
    .al{stroke:#C8F250;stroke-width:1.9;fill:none;marker-end:url(#alm)}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#6E7C90"/></marker>
    <marker id="alm" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#C8F250"/></marker>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8F250" stop-opacity="0.30"/><stop offset="65%" stop-color="#C8F250" stop-opacity="0.06"/><stop offset="100%" stop-color="#C8F250" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#D4FA66"/><stop offset="100%" stop-color="#A6D63A"/></linearGradient>
  </defs>

  <rect x="0" y="0" width="980" height="510" rx="14" fill="#0A0C10"/>
  <text x="40" y="46" class="h disp" font-size="25">Many apps. One Switchboard.</text>
  <text x="40" y="72" class="dim" font-size="14">Every app points at one Switchboard — it holds your <tspan class="t">data</tspan>, your <tspan class="t">context</tspan> and your <tspan class="t">inference</tspan>, and reaches your <tspan class="t">tools</tspan>.</text>

  <!-- APPS -->
  <text x="40" y="118" class="faint mono" font-size="11">APPS</text>
  <g class="app-tiles">
    <rect class="app" x="34" y="130" width="120" height="38" rx="9"/><text x="94" y="154" class="t" font-size="12.5" text-anchor="middle" font-family="'Bricolage Grotesque',sans-serif">brandbrain</text>
    <rect class="app" x="34" y="176" width="120" height="38" rx="9"/><text x="94" y="200" class="t" font-size="12.5" text-anchor="middle" font-family="'Bricolage Grotesque',sans-serif">Cast</text>
    <rect class="app" x="34" y="222" width="120" height="38" rx="9"/><text x="94" y="246" class="t" font-size="12.5" text-anchor="middle" font-family="'Bricolage Grotesque',sans-serif">Prism</text>
    <rect class="app" x="34" y="268" width="120" height="38" rx="9"/><text x="94" y="292" class="t" font-size="12.5" text-anchor="middle" font-family="'Bricolage Grotesque',sans-serif">Ad gen</text>
    <rect class="app" x="34" y="314" width="120" height="38" rx="9"/><text x="94" y="338" class="dim" font-size="12" text-anchor="middle" font-family="'Bricolage Grotesque',sans-serif">any website</text>
  </g>
  <text x="94" y="378" class="faint mono" font-size="10" text-anchor="middle">…and more</text>

  <!-- arrows apps -> switchboard -->
  <path class="ain" d="M154 149 L214 268"/>
  <path class="ain" d="M154 195 L214 278"/>
  <path class="ain" d="M154 241 L214 290"/>
  <path class="ain" d="M154 287 L214 300"/>
  <path class="ain" d="M154 333 L214 312"/>

  <!-- SWITCHBOARD hub -->
  <circle cx="288" cy="290" r="120" fill="url(#glow)"/>
  <rect x="220" y="232" width="140" height="116" rx="26" fill="url(#hub)"/>
  <circle cx="332" cy="264" r="10" fill="#0A0C10"/>
  <text x="290" y="298" class="ink disp" font-size="17" text-anchor="middle">Switchboard</text>
  <text x="290" y="320" class="ink mono" font-size="10" text-anchor="middle" opacity="0.85">your vault</text>

  <!-- switchboard -> data / context / inference -->
  <path class="al" d="M360 268 L438 186"/>
  <path class="al" d="M360 290 L438 262"/>
  <path class="al" d="M360 312 L438 372"/>

  <text x="448" y="150" class="faint mono" font-size="10">YOURS</text>
  <rect class="box" x="440" y="158" width="230" height="56" rx="11"/>
  <text x="458" y="184" class="t" font-size="14" font-family="'Bricolage Grotesque',sans-serif">Data</text>
  <text x="458" y="203" class="faint" font-size="11">your files &amp; records — local</text>

  <rect class="box" x="440" y="228" width="230" height="56" rx="11"/>
  <text x="458" y="254" class="t" font-size="14" font-family="'Bricolage Grotesque',sans-serif">Context</text>
  <text x="458" y="273" class="faint" font-size="11">brands, projects — portable</text>

  <!-- inference container -->
  <rect class="infer" x="440" y="298" width="230" height="164" rx="12"/>
  <text x="458" y="322" class="lime mono" font-size="10.5">INFERENCE</text>
  <rect class="pill" x="456" y="330" width="198" height="54" rx="9"/>
  <text x="472" y="354" class="t" font-size="13" font-family="'Bricolage Grotesque',sans-serif">Claude</text>
  <text x="472" y="372" class="faint" font-size="10.5">your subscription</text>
  <rect class="pill" x="456" y="392" width="198" height="54" rx="9"/>
  <text x="472" y="416" class="t" font-size="13" font-family="'Bricolage Grotesque',sans-serif">Local models</text>
  <text x="472" y="434" class="faint" font-size="10.5">Ollama · on-device · private</text>

  <!-- claude -> tools -->
  <path class="al" d="M654 357 L716 357"/>
  <text x="686" y="349" class="lime mono" font-size="9" text-anchor="middle">uses</text>
  <rect class="box" x="718" y="330" width="232" height="54" rx="11"/>
  <text x="736" y="354" class="t" font-size="14" font-family="'Bricolage Grotesque',sans-serif">Tools</text>
  <text x="736" y="372" class="faint" font-size="10.5">Higgsfield · Shopify · Gmail · Web</text>

  <text x="835" y="418" class="faint mono" font-size="10" text-anchor="middle">the connectors you already have</text>
  <text x="40" y="494" class="faint mono" font-size="11">apps borrow the whole stack, under consent · runs on your compute · no keys · your data never leaves the machine</text>
</svg>
