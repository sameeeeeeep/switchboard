<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      /* Relay side panel — brandbrain's visual language: ink-black, panel cards, lime as the one
         accent, Bricolage display + Hanken body + Spline mono for data. Signature: a per-site
         budget meter that runs lime → amber → danger as a site spends your compute. */
      :root {
        --page: #0A0C10; --inset: #070809; --panel: #12151C; --raised: #1A1F29;
        --edge: #262C38; --edge-soft: #1C212B;
        --ink: #E8EDF4; --ink-sec: #B4BECE; --ink-dim: #99A3B7; --ink-faint: #6E7C90;
        --lime: #C8F250; --lime-soft: #232B0D;
        --ok: #3DD68C; --warn: #F59E0B; --danger: #FF2D6E; --danger-soft: #2A0E1A;
        --display: "Bricolage Grotesque", ui-sans-serif, system-ui, sans-serif;
        --sans: "Hanken Grotesk", ui-sans-serif, system-ui, sans-serif;
        --mono: "Spline Sans Mono", ui-monospace, monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; }
      body { background: var(--page); color: var(--ink); font: 13px/1.5 var(--sans); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
      ::selection { background: rgba(200, 242, 80, 0.3); }
      * { scrollbar-width: thin; scrollbar-color: #262c38 transparent; }
      .kicker { font: 500 10px/1 var(--mono); text-transform: uppercase; letter-spacing: 0.16em; color: var(--ink-dim); }

      .wrap { padding: 0 0 40px; max-width: 440px; margin: 0 auto; }

      /* header — sticky, hairline, backdrop blur (brandbrain topbar) */
      .top { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 9px; height: 52px; padding: 0 16px; border-bottom: 1px solid var(--edge); background: color-mix(in srgb, var(--page) 82%, transparent); backdrop-filter: blur(8px); }
      .brand { display: flex; align-items: center; gap: 8px; font: 600 15px/1 var(--display); letter-spacing: -0.02em; }
      .glyph { width: 15px; height: 15px; border-radius: 4px; background: var(--lime); box-shadow: 0 0 12px rgba(200,242,80,.35); }
      .paired { font: 400 11px/1 var(--mono); color: var(--ink-faint); }
      .paired b { color: var(--ok); font-weight: 500; }
      .kill { margin-left: auto; font: 500 12px/1 var(--sans); color: var(--ink-dim); background: transparent; border: 1px solid var(--edge); border-radius: 8px; padding: 7px 10px; cursor: pointer; transition: color .15s, border-color .15s; }
      .kill:hover { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 45%, var(--edge)); }

      .body { padding: 14px 16px; }

      /* aggregate */
      .total { border: 1px solid var(--edge); background: var(--panel); border-radius: 14px; padding: 14px; }
      .total .big { font: 500 24px/1.05 var(--mono); letter-spacing: -0.02em; margin-top: 8px; font-variant-numeric: tabular-nums; }
      .total .big small { color: var(--ink-dim); font-size: 12px; letter-spacing: 0; }
      .meter { height: 6px; border-radius: 999px; background: var(--inset); overflow: hidden; margin-top: 11px; }
      .meter > i { display: block; height: 100%; border-radius: 999px; transition: width .4s ease; }

      .sec { display: flex; justify-content: space-between; align-items: center; margin: 18px 2px 9px; }

      /* site card */
      .site { border: 1px solid var(--edge); background: var(--panel); border-radius: 14px; padding: 13px 14px; margin-bottom: 10px; transition: border-color .15s; }
      .site:hover { border-color: var(--edge-soft); }
      .site.pending { border-color: color-mix(in srgb, var(--danger) 55%, var(--edge)); background: linear-gradient(color-mix(in srgb, var(--danger-soft) 45%, var(--panel)), var(--panel)); }
      .site .head { display: flex; align-items: center; gap: 9px; }
      .fav { width: 22px; height: 22px; border-radius: 6px; background: var(--lime-soft); color: var(--lime); display: grid; place-items: center; font: 600 11px/1 var(--display); flex: none; }
      .origin { font: 600 14px/1.2 var(--display); letter-spacing: -0.01em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .revoke { margin-left: auto; font: 500 12px/1 var(--sans); color: var(--ink-faint); background: none; border: 0; cursor: pointer; padding: 4px; transition: color .15s; }
      .revoke:hover { color: var(--danger); }
      .metrics { display: flex; gap: 6px; align-items: baseline; margin-top: 12px; font-family: var(--mono); font-variant-numeric: tabular-nums; }
      .metrics .num { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
      .metrics .of { color: var(--ink-faint); font-size: 12px; }
      .metrics .rate { margin-left: auto; font-size: 11px; color: var(--ink-dim); }
      .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; }
      .chip { font: 400 11px/1 var(--mono); padding: 4px 9px; border-radius: 999px; background: var(--raised); color: var(--ink-dim); }
      .chip.write { color: var(--danger); background: color-mix(in srgb, var(--danger) 12%, var(--raised)); }

      /* per-site trust mode segmented control */
      .mode { display: inline-flex; margin-top: 11px; border: 1px solid var(--edge); border-radius: 8px; overflow: hidden; }
      .mode button { font: 500 11px/1 var(--sans); color: var(--ink-dim); background: transparent; border: 0; padding: 6px 11px; cursor: pointer; border-right: 1px solid var(--edge); }
      .mode button:last-child { border-right: 0; }
      .mode button:hover { color: var(--ink); }
      .mode button.on { background: var(--lime); color: var(--page); font-weight: 600; }
      .mode button.on.warn { background: var(--danger); color: #fff; }

      .pend { margin-top: 12px; border-top: 1px solid var(--edge-soft); padding-top: 11px; display: flex; align-items: center; gap: 10px; }
      .pend .txt { font-size: 12.5px; color: var(--ink-sec); }
      .pend .txt b { font-family: var(--mono); font-weight: 500; color: var(--ink); }
      .pend .btns { margin-left: auto; display: flex; gap: 7px; }
      .pend button { font: 500 12px/1 var(--sans); border-radius: 8px; padding: 7px 12px; cursor: pointer; border: 1px solid transparent; }
      .approve { background: var(--lime); color: var(--page); }
      .approve:hover { opacity: .9; }
      .deny { background: transparent; color: var(--ink-dim); border-color: var(--edge) !important; }

      /* activity */
      .feed { border-left: 1px solid var(--edge); margin: 4px 0 0 7px; padding-left: 15px; }
      .ev { position: relative; padding: 8px 0; }
      .ev::before { content: ""; position: absolute; left: -19px; top: 12px; width: 7px; height: 7px; border-radius: 50%; background: var(--ink-faint); box-shadow: 0 0 0 3px var(--page); }
      .ev.ok::before { background: var(--ok); } .ev.write::before { background: var(--warn); } .ev.deny::before { background: var(--danger); }
      .ev .t { font: 400 11px/1 var(--mono); color: var(--ink-faint); }
      .ev .d { font-size: 12.5px; color: var(--ink-dim); margin-top: 3px; }
      .ev .d b { color: var(--ink-sec); font-weight: 600; }
      .empty { color: var(--ink-faint); font-size: 12.5px; padding: 10px 2px; }

      /* pairing (shown when not paired) */
      .pairing { border: 1px solid var(--edge); background: var(--panel); border-radius: 14px; padding: 16px; }
      .pairing h2 { font: 600 15px/1.2 var(--display); letter-spacing: -0.01em; margin: 8px 0 6px; }
      .pairing p { color: var(--ink-dim); font-size: 13px; margin: 0 0 12px; }
      .pairing code { font-family: var(--mono); font-size: 12px; background: var(--raised); padding: 1px 6px; border-radius: 5px; color: var(--ink-sec); }
      .pairing input { width: 100%; font: 400 13px/1 var(--mono); color: var(--ink); background: var(--inset); border: 1px solid var(--edge); border-radius: 9px; padding: 10px 11px; outline: none; }
      .pairing input:focus { border-color: color-mix(in srgb, var(--lime) 55%, var(--edge)); }
      .pairing button { width: 100%; margin-top: 9px; background: var(--lime); color: var(--page); border: 0; border-radius: 9px; padding: 10px; font: 600 13px/1 var(--sans); cursor: pointer; }
      .pairing button:hover { opacity: .9; }
      .pairing .err { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 14px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="brand"><span class="glyph"></span>Relay</div>
        <span class="paired" id="statusText"><b>●</b> paired</span>
        <button class="kill" id="kill">Kill switch</button>
      </div>
      <div class="body">
        <div id="consent" hidden></div>

        <div class="pairing" id="pairing" hidden>
          <div class="kicker">Pair your sidekick</div>
          <h2>Connect this browser to your Claude</h2>
          <p>Run <code>npm run sidekick</code> in your terminal and paste the pairing token it prints.</p>
          <input id="token" placeholder="pairing token" autocomplete="off" spellcheck="false" />
          <button id="pairBtn">Pair</button>
          <div class="err" id="pairErr"></div>
        </div>

        <div id="dashboard" hidden>
          <div class="total">
            <div class="kicker">Your compute today</div>
            <div class="big" id="totalNum">—</div>
            <div class="meter"><i id="totalBar"></i></div>
          </div>

          <div class="sec"><span class="kicker">Connected sites</span><span class="kicker" id="siteCount"></span></div>
          <div id="sites"></div>

          <div class="sec"><span class="kicker">Activity</span></div>
          <div class="feed" id="feed"></div>
        </div>
      </div>
    </div>
    <script src="dist/sidepanel.js"></script>
  </body>
</html>
