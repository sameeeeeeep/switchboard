<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relay</title>
    <style>
      :root { color-scheme: light dark; font: 13px/1.5 -apple-system, system-ui, sans-serif; }
      body { width: 340px; margin: 0; padding: 14px; }
      h1 { font-size: 14px; margin: 0 0 2px; }
      .sub { opacity: .6; margin: 0 0 12px; }
      .card { border: 1px solid color-mix(in srgb, currentColor 15%, transparent); border-radius: 10px; padding: 10px; margin-bottom: 8px; }
      .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
      button { font: inherit; border-radius: 8px; border: 1px solid transparent; padding: 5px 10px; cursor: pointer; }
      .danger { color: #b00020; }
      .kill { width: 100%; background: #b00020; color: #fff; margin-top: 8px; }
      code { background: color-mix(in srgb, currentColor 10%, transparent); padding: 1px 4px; border-radius: 4px; }
      .muted { opacity: .55; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>Relay</h1>
    <p class="sub">Your Claude + tools, lent to sites under consent.</p>

    <div class="card" id="pairing" hidden>
      <div class="row"><strong>Pair with your sidekick</strong></div>
      <p class="muted">Paste the pairing token printed by <code>relay-sidekick</code>.</p>
      <input id="token" placeholder="pairing token" style="width:100%;box-sizing:border-box" />
      <button id="pair" style="margin-top:6px">Pair</button>
    </div>

    <div class="card">
      <div class="row"><strong>Status</strong><span id="status" class="muted">checking…</span></div>
    </div>

    <div id="origins"></div>

    <div class="card">
      <div class="row"><strong>Audit log</strong><button id="export">Export</button></div>
      <div id="audit" class="muted">No activity yet.</div>
    </div>

    <button class="kill" id="kill">Kill switch — revoke all &amp; disconnect</button>
    <script src="dist/popup.js"></script>
  </body>
</html>
