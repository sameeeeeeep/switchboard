<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Switchboard — airgapped runner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600&family=Hanken+Grotesk:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --page:#0A0C10; --inset:#070809; --panel:#12151C; --raised:#1A1F29; --edge:#262C38; --edge-soft:#1C212B;
        --ink:#E8EDF4; --ink-sec:#B4BECE; --ink-dim:#99A3B7; --ink-faint:#6E7C90;
        --lime:#C8F250; --lime-soft:#232B0D; --ok:#3DD68C; --danger:#FF2D6E; --warn:#F59E0B;
        --disp:"Bricolage Grotesque",system-ui,sans-serif; --sans:"Hanken Grotesk",system-ui,sans-serif; --mono:"Spline Sans Mono",ui-monospace,monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body { background: var(--page); color: var(--ink); font: 14px/1.5 var(--sans); -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; height: 100vh; }
      .kick { font: 500 10px/1 var(--mono); text-transform: uppercase; letter-spacing: .16em; color: var(--ink-dim); }

      header { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--edge); }
      .brand { display: flex; align-items: center; gap: 8px; font: 600 15px/1 var(--disp); letter-spacing: -0.02em; }
      .glyph { width: 15px; height: 15px; border-radius: 4px; background: var(--lime); box-shadow: 0 0 12px rgba(200,242,80,.4); }
      .running { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-sec); }
      .running .app { font-weight: 600; color: var(--ink); }
      .lock { margin-left: auto; display: inline-flex; align-items: center; gap: 7px; font: 500 12px/1 var(--sans); color: var(--lime); background: var(--lime-soft); border: 1px solid color-mix(in srgb, var(--lime) 30%, transparent); border-radius: 999px; padding: 6px 12px; }

      main { flex: 1; display: grid; grid-template-columns: 1fr 340px; min-height: 0; }
      .stage { padding: 16px; min-height: 0; display: flex; flex-direction: column; }
      .screen { flex: 1; border: 1px solid var(--edge); border-radius: 14px; overflow: hidden; background: #fff; position: relative; min-height: 0; }
      .screen iframe { width: 100%; height: 100%; border: 0; display: block; }
      .screenbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; }
      .screenbar .dots { display: flex; gap: 5px; } .screenbar .dots i { width: 9px; height: 9px; border-radius: 50%; background: var(--edge); }
      .screenbar .url { font: 400 11px/1 var(--mono); color: var(--ink-faint); background: var(--inset); border: 1px solid var(--edge); border-radius: 7px; padding: 5px 9px; }

      aside { border-left: 1px solid var(--edge); display: flex; flex-direction: column; min-height: 0; }
      aside .head { padding: 14px 16px 8px; }
      aside h2 { font: 600 14px/1.2 var(--disp); margin: 4px 0 2px; }
      aside .sub { font-size: 12px; color: var(--ink-dim); }
      .log { flex: 1; overflow: auto; padding: 6px 16px 16px; }
      .ev { display: flex; gap: 9px; align-items: baseline; padding: 7px 0; border-top: 1px solid var(--edge-soft); }
      .ev .t { font: 400 10.5px/1.4 var(--mono); color: var(--ink-faint); flex: none; width: 40px; }
      .ev .m { font-size: 12.5px; }
      .ev.ok .m { color: var(--ink-sec); } .ev.ok::before { content:"✅"; }
      .ev.block .m { color: color-mix(in srgb, var(--danger) 90%, white); } .ev.block::before { content:"🚫"; }
      .ev.info .m { color: var(--ink-dim); } .ev.info::before { content:"•"; color: var(--ink-faint); }
      .ev::before { flex: none; font-size: 12px; }
      .tally { display: flex; gap: 14px; padding: 10px 16px; border-top: 1px solid var(--edge); font: 500 12px/1 var(--mono); }
      .tally .brokered { color: var(--lime); } .tally .blocked { color: var(--danger); }
    </style>
  </head>
  <body>
    <header>
      <span class="brand"><span class="glyph"></span>Switchboard</span>
      <span class="running">Running <span class="app" id="appName">d2cos.ai</span> <span class="kick">unverified</span></span>
      <span class="lock">🔒 Airgapped — no network egress</span>
    </header>
    <main>
      <div class="stage">
        <div class="screenbar"><span class="dots"><i></i><i></i><i></i></span><span class="url" id="appUrl">switchboard.ai/run/d2cos</span></div>
        <div class="screen"><iframe id="app" sandbox="allow-scripts" referrerpolicy="no-referrer"></iframe></div>
      </div>
      <aside>
        <div class="head">
          <div class="kick">Airgap monitor</div>
          <h2>What the app can and can't do</h2>
          <div class="sub">Every call the app makes, live. Its only way out is the consented broker.</div>
        </div>
        <div class="log" id="log"></div>
        <div class="tally"><span class="brokered" id="tallyOk">0 brokered</span><span class="blocked" id="tallyBlock">0 blocked</span></div>
      </aside>
    </main>
    <script src="runner.js"></script>
  </body>
</html>
