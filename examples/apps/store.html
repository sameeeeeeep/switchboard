<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>App Store — Switchboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* Wrapp Store — the store HOME (a clean landing: featured OS → popular apps → context bar).
         The full directory lives behind "Browse all". Matches the reference: dark, glossy, iconful,
         low-text, violet→magenta accent. */
      :root {
        --bg: #0A0A12; --bg2: #07070D; --panel: #14141F; --panel-2: #191926; --raised: #1E1E2C;
        --edge: #262636; --edge-soft: #1E1E2C;
        --ink: #ECECF5; --ink-2: #B9B9CC; --dim: #8E8EA3; --faint: #63637A;
        --v1: #8B5CF6; --v2: #D946EF; --violet-soft: #1C1730;
        --ok: #34D399;
        --grad: linear-gradient(135deg, #8B5CF6, #D946EF);
        --sans: "Inter", ui-sans-serif, system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      [hidden] { display: none !important; }
      html, body { margin: 0; }
      body { background: var(--bg); color: var(--ink); font: 14px/1.5 var(--sans); -webkit-font-smoothing: antialiased; }
      button { font-family: inherit; cursor: pointer; }
      ::selection { background: rgba(217,70,239,.3); }
      * { scrollbar-width: thin; scrollbar-color: #262636 transparent; }
      .eyebrow { font: 600 10.5px/1 var(--sans); letter-spacing: .1em; text-transform: uppercase; color: var(--faint); }

      .app { display: grid; grid-template-columns: 256px 1fr; min-height: 100vh; }
      @media (max-width: 900px) { .app { grid-template-columns: 1fr; } .rail { display: none; } }

      /* ---- sidebar ---- */
      .rail { border-right: 1px solid var(--edge); background: var(--bg2); padding: 18px 14px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
      .brand { display: flex; align-items: center; gap: 10px; font: 700 17px/1 var(--sans); letter-spacing: -.01em; padding: 4px 8px; }
      .brand .g { width: 28px; height: 28px; border-radius: 8px; background: var(--grad); display: grid; place-items: center; box-shadow: 0 0 18px rgba(139,92,246,.4); }
      .nav { display: flex; flex-direction: column; gap: 2px; }
      .nav a { display: flex; align-items: center; gap: 12px; padding: 9px 11px; border-radius: 10px; color: var(--dim); font: 500 13.5px/1 var(--sans); text-decoration: none; }
      .nav a:hover { background: var(--panel); color: var(--ink); }
      .nav a.on { background: var(--violet-soft); color: #E9D5FF; }
      .nav a svg { width: 17px; height: 17px; flex: none; }
      .group .gh { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px 7px; }
      .group .gh .add { width: 18px; height: 18px; border-radius: 5px; border: 1px solid var(--edge); background: transparent; color: var(--dim); display: grid; place-items: center; font-size: 13px; line-height: 1; }
      .item { display: flex; align-items: center; gap: 10px; padding: 7px 8px; border-radius: 9px; color: var(--ink-2); font: 500 13px/1.1 var(--sans); cursor: pointer; }
      .item:hover { background: var(--panel); }
      .item.active { background: var(--panel); }
      .item .mk { width: 24px; height: 24px; border-radius: 7px; flex: none; display: grid; place-items: center; font: 700 10px/1 var(--sans); color: #fff; }
      .item .nm { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .item .st { font: 500 10px/1 var(--sans); color: var(--ok); }
      .item .badge { margin-left: auto; font: 600 9.5px/1 var(--sans); color: var(--v2); background: rgba(217,70,239,.12); border-radius: 5px; padding: 3px 5px; }
      .item.link { color: var(--dim); font-size: 12.5px; padding-left: 10px; }
      .item.app .mk { background: var(--panel-2); }
      .who { margin-top: auto; display: flex; align-items: center; gap: 10px; padding: 9px 8px; border: 1px solid var(--edge); border-radius: 12px; background: var(--panel); }
      .who .av { width: 34px; height: 34px; border-radius: 9px; object-fit: cover; background: var(--grad); flex: none; display:grid; place-items:center; font:700 13px/1 var(--sans); color:#fff; }
      .who .nm { font: 600 13px/1.1 var(--sans); } .who .em { font: 500 11px/1 var(--sans); color: var(--faint); margin-top: 3px; }
      .who .cv { margin-left: auto; color: var(--faint); }

      /* ---- topbar ---- */
      .main { min-width: 0; }
      .topbar { display: flex; align-items: center; gap: 14px; padding: 14px 30px; border-bottom: 1px solid var(--edge); }
      .search { flex: 1; max-width: 560px; margin: 0 auto; display: flex; align-items: center; gap: 11px; background: var(--panel); border: 1px solid var(--edge); border-radius: 11px; padding: 11px 14px; }
      .search input { flex: 1; background: none; border: 0; outline: none; color: var(--ink); font: 500 13.5px/1 var(--sans); }
      .search input::placeholder { color: var(--faint); }
      .search .k { font: 500 11px/1 var(--sans); color: var(--faint); border: 1px solid var(--edge); border-radius: 5px; padding: 3px 6px; }
      .tb-icon { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--edge); background: transparent; color: var(--dim); display: grid; place-items: center; position: relative; }
      .tb-icon .dot { position: absolute; top: 9px; right: 10px; width: 6px; height: 6px; border-radius: 50%; background: var(--v2); }
      .invite { display: flex; align-items: center; gap: 8px; border: 1px solid var(--edge); background: var(--panel); color: var(--ink); border-radius: 10px; padding: 9px 14px; font: 600 12.5px/1 var(--sans); }

      .content { padding: 26px 30px 40px; }
      .head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; }
      .head h1 { font: 700 28px/1.05 var(--sans); letter-spacing: -.02em; margin: 0 0 6px; }
      .head p { color: var(--dim); font-size: 14.5px; margin: 0; }
      .browse { color: var(--v2); font: 600 13px/1 var(--sans); background: none; border: 0; display: inline-flex; align-items: center; gap: 6px; }

      /* ---- featured OS ---- */
      .feature { position: relative; overflow: hidden; border: 1px solid var(--edge); border-radius: 20px; padding: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px;
        background: radial-gradient(80% 120% at 78% 8%, rgba(217,70,239,.16), transparent 60%), radial-gradient(60% 100% at 95% 90%, rgba(139,92,246,.12), transparent 60%), var(--panel); }
      @media (max-width: 760px) { .feature { grid-template-columns: 1fr; } .constellation { display: none; } }
      .fe { align-self: center; }
      .fe .eyebrow { color: var(--v2); }
      .fe h2 { font: 700 40px/1 var(--sans); letter-spacing: -.03em; margin: 12px 0 12px; }
      .fe p { color: var(--ink-2); font-size: 16px; margin: 0 0 18px; max-width: 34ch; }
      .facts { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 22px; }
      .fact { display: flex; align-items: center; gap: 8px; font: 500 13px/1 var(--sans); color: var(--dim); }
      .fact svg { width: 16px; height: 16px; color: var(--v1); }
      .fact b { color: var(--ink); font-weight: 600; }
      .explore { background: var(--grad); color: #fff; border: 0; border-radius: 12px; padding: 13px 22px; font: 600 14px/1 var(--sans); box-shadow: 0 8px 24px -8px rgba(217,70,239,.5); }

      .constellation { position: relative; min-height: 300px; }
      .orbit { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); border: 1px solid rgba(255,255,255,.06); border-radius: 50%; }
      .hub { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 92px; height: 92px; border-radius: 26px; background: var(--grad); display: grid; place-items: center; box-shadow: 0 0 60px rgba(217,70,239,.5); }
      .node { position: absolute; transform: translate(-50%,-50%); display: flex; flex-direction: column; align-items: center; gap: 6px; }
      .node .t { width: 46px; height: 46px; border-radius: 14px; background: var(--panel-2); border: 1px solid var(--edge); display: grid; place-items: center; box-shadow: 0 8px 20px -10px rgba(0,0,0,.6); }
      .node .l { font: 500 10px/1 var(--sans); color: var(--dim); white-space: nowrap; }

      /* ---- popular apps ---- */
      .sec-h { display: flex; align-items: center; justify-content: space-between; margin: 0 0 16px; }
      .sec-h h3 { font: 700 18px/1 var(--sans); letter-spacing: -.01em; margin: 0; }
      .apps { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
      @media (max-width: 1400px) { .apps { grid-template-columns: repeat(4, 1fr); } }
      @media (max-width: 1040px) { .apps { grid-template-columns: repeat(3, 1fr); } }
      @media (max-width: 720px) { .apps { grid-template-columns: repeat(2, 1fr); } }
      .card { border: 1px solid var(--edge); background: var(--panel); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; }
      .card:hover { border-color: #34344a; }
      .card .ic { width: 46px; height: 46px; border-radius: 13px; display: grid; place-items: center; margin-bottom: 14px; }
      .card .ic svg { width: 22px; height: 22px; color: #fff; }
      .card .nm { font: 600 15px/1.1 var(--sans); }
      .card .ds { font: 400 12.5px/1.45 var(--sans); color: var(--dim); margin: 7px 0 0; flex: 1; }
      .card .meta { display: flex; align-items: center; gap: 7px; font: 500 11.5px/1 var(--sans); color: var(--dim); margin: 14px 0 12px; }
      .card .meta .star { color: #FBBF24; }
      .card .install { width: 100%; background: var(--panel-2); color: var(--ink); border: 1px solid var(--edge); border-radius: 10px; padding: 10px; font: 600 12.5px/1 var(--sans); }
      .card .install:hover { border-color: var(--v1); color: #fff; }
      .card.installed .install { background: var(--violet-soft); color: #E9D5FF; border-color: transparent; }

      /* ---- context bar ---- */
      .ctxbar { margin-top: 30px; border: 1px solid var(--edge); border-radius: 16px; background: var(--panel); padding: 16px 20px; display: flex; align-items: center; gap: 26px; flex-wrap: wrap; }
      .ctxbar .who2 { display: flex; align-items: center; gap: 12px; }
      .ctxbar .who2 .mk { width: 38px; height: 38px; border-radius: 10px; background: var(--grad); display: grid; place-items: center; font: 700 15px/1 var(--sans); color: #fff; }
      .ctxbar .who2 .t { font: 500 12.5px/1 var(--sans); color: var(--dim); }
      .ctxbar .who2 .n { font: 700 15px/1 var(--sans); display: flex; align-items: center; gap: 9px; margin-top: 4px; }
      .ctxbar .who2 .n .live { font: 500 11px/1 var(--sans); color: var(--ok); display: inline-flex; align-items: center; gap: 5px; }
      .ctxbar .who2 .n .live::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }
      .stats { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
      .stat { display: flex; align-items: center; gap: 9px; }
      .stat svg { width: 17px; height: 17px; color: var(--faint); }
      .stat .v { font: 700 14px/1 var(--sans); } .stat .k { font: 500 11px/1 var(--sans); color: var(--faint); margin-top: 3px; }
      .ctxbar .acts { margin-left: auto; display: flex; gap: 10px; }
      .ctxbar .ghost { border: 1px solid var(--edge); background: transparent; color: var(--ink); border-radius: 10px; padding: 10px 16px; font: 600 12.5px/1 var(--sans); }
      .ctxbar .prim { background: var(--grad); color: #fff; border: 0; border-radius: 10px; padding: 10px 18px; font: 600 12.5px/1 var(--sans); }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="rail">
        <div class="brand"><span class="g"><svg width="15" height="15" viewBox="0 0 24 24" fill="#fff"><path d="M13 2L4.5 13.5H11l-1 8.5L19.5 10H13z"/></svg></span>Switchboard</div>
        <nav class="nav" id="nav"></nav>
        <div class="group"><div class="gh"><span class="eyebrow">Contexts</span><button class="add">+</button></div><div id="ctxs"></div></div>
        <div class="group"><div class="gh"><span class="eyebrow">Installed Apps</span></div><div id="installed"></div></div>
        <div class="who"><div class="av">SR</div><div><div class="nm">Sam Rehlan</div><div class="em">sam@switchboard.com</div></div><svg class="cv" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 9l4 4 4-4"/></svg></div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div style="width:38px"></div>
          <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#63637A" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><input id="q" placeholder="Search apps or workflows…" /><span class="k">⌘K</span></div>
          <button class="tb-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0"/></svg><span class="dot"></span></button>
          <button class="invite"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.5"/><path d="M2 20c0-3.5 3-6 7-6M17 8v6M20 11h-6"/></svg>Invite Team</button>
        </div>

        <div class="content">
          <div class="head">
            <div><h1>App Store</h1><p>Install AI-native apps. Powered by your context.</p></div>
            <button class="browse">Browse all apps →</button>
          </div>

          <div class="feature" id="feature"></div>

          <div class="sec-h"><h3>Popular Apps</h3><button class="browse">View all apps →</button></div>
          <div class="apps" id="apps"></div>

          <div class="ctxbar" id="ctxbar"></div>
        </div>
      </main>
    </div>
    <script type="module" src="./dist/store.js"></script>
  </body>
</html>
