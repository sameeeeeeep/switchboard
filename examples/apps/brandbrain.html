<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>brandbrain — find your white space</title>
    <link rel="stylesheet" href="./app.css" />
    <style>
      .topbar .connect { margin-left: auto; }
      .relay-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--lime); color: var(--page); border: 0; border-radius: 999px; padding: 9px 15px; font: 600 13px/1 var(--sans); cursor: pointer; }
      .relay-status { margin-left: auto; font: 500 12px/1 var(--sans); color: var(--ink-dim); display: inline-flex; align-items: center; gap: 7px; }
      .relay-status .g { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); }
      .form { display: grid; gap: 12px; margin-top: 8px; }
      .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      label .k { display: block; margin-bottom: 5px; }
      .gaps { display: grid; gap: 12px; margin-top: 24px; }
      .gap { border: 1px solid var(--edge); background: var(--panel); border-radius: 14px; padding: 15px; }
      .gap h3 { font: 600 16px/1.2 var(--display); letter-spacing: -0.01em; margin: 0 0 4px; }
      .gap p { margin: 0 0 12px; color: var(--ink-dim); font-size: 13.5px; }
      .scorebar { height: 6px; border-radius: 999px; background: var(--inset); overflow: hidden; }
      .scorebar > i { display: block; height: 100%; background: var(--lime); border-radius: 999px; }
      .scorerow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font: 500 11px/1 var(--mono); color: var(--ink-faint); }
      .comp { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
      .comp span { font: 400 10.5px/1 var(--mono); color: var(--ink-dim); background: var(--raised); border-radius: 6px; padding: 4px 7px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <span class="glyph"></span><span class="brand">brandbrain</span>
        <button class="relay-btn connect" id="connect">Connect Switchboard</button>
        <span class="relay-status" id="status" hidden><span class="g"></span><span id="statusText"></span></span>
      </div>

      <div class="kicker">Find your white space</div>
      <h1>Where's the opening?</h1>
      <p class="sub">Name a category and a couple of incumbents. brandbrain finds fresh openings a new brand could own — grounded, scored, generated on <em class="you">your</em> own Claude.</p>

      <div class="panel form">
        <label><span class="kicker k">Category</span><input type="text" id="cat" value="functional tea" /></label>
        <label><span class="kicker k">A couple incumbents (comma-separated)</span><input type="text" id="players" value="Pukka, Moonbrew" /></label>
        <div><button class="btn btn-primary" id="go" disabled>Find openings</button></div>
      </div>
      <div id="events"></div>
      <div class="gaps" id="gaps"></div>
    </div>
    <script type="module" src="./dist/brandbrain.js"></script>
  </body>
</html>
