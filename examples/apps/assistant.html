<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tool assistant — your tools, gated</title>
    <style>
      body { font: 15px/1.6 system-ui, sans-serif; max-width: 680px; margin: 32px auto; padding: 0 16px; }
      h1 { font-size: 20px; }
      .status { font-size: 13px; color: #666; }
      .tools { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
      .tool { font-size: 12px; border: 1px solid #ddd; border-radius: 999px; padding: 2px 10px; }
      .tool.write { border-color: #b00020; color: #b00020; }
      #out { white-space: pre-wrap; border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin: 14px 0; min-height: 60px; }
      .event { color: #555; font-size: 13px; }
      textarea { width: 100%; box-sizing: border-box; font: inherit; padding: 8px; min-height: 54px; }
      button { font: inherit; padding: 8px 14px; border-radius: 8px; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>🛠️ Tool assistant <span class="status" id="status">— not connected</span></h1>
    <p class="status">
      This app never integrated a single tool. On connect it inherits whichever MCP servers YOU
      connected to the sidekick. Reads run within scope; writes pop a per-action consent window.
    </p>
    <button id="connect">Connect Relay</button>
    <div class="tools" id="tools"></div>
    <textarea id="prompt" placeholder="Ask the assistant to use your tools…">List my connected tools and, if I have a filesystem tool, summarize what's in the first directory you can read.</textarea>
    <div><button id="run" disabled>Run (agentic)</button></div>
    <div id="out"></div>
    <script type="module" src="./dist/assistant.js"></script>
  </body>
</html>
