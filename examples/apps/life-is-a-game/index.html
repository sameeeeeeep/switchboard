<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Life is a Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      /* LIFE IS A GAME — house design system (ported from the neon-city grammar).
         Layout law: the STAGE belongs to the game. Every HUD element floats, never
         re-composites the live canvas (NO backdrop-filter over the canvas — that forces
         a full-frame compositor pass and was a documented perf killer). */
      :root {
        --night: #0a0418; --panel: rgba(16, 7, 38, 0.9); --edge: rgba(255, 122, 189, 0.32);
        --ink: #fff3e8; --ink-dim: #d9b8c9; --ink-faint: #a583a0;
        --pink: #ff5fa2; --teal: #2de1c2; --lime: #c8f250; --gold: #ffcf6b;
        --px: "Silkscreen", monospace;
        --body: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      [hidden] { display: none !important; }
      html, body { margin: 0; height: 100%; overflow: hidden; }
      body { background: var(--night); color: var(--ink); font: 14px/1.5 var(--body); -webkit-font-smoothing: antialiased; user-select: none; }

      #stage { position: absolute; inset: 0; display: grid; place-items: center; overflow: hidden; background: var(--night); }
      #game { display: block; image-rendering: pixelated; }
      .hud { position: absolute; pointer-events: none; }

      #objective { left: 14px; top: 12px; background: var(--panel); border: 1px solid var(--edge); border-radius: 10px;
        padding: 8px 12px 7px; font: 700 8px/1.5 var(--px); letter-spacing: .1em; color: var(--ink-dim); text-transform: uppercase; max-width: 320px; }
      #objective b { color: var(--gold); }

      /* worst-frame meter — the one metric that governs every step. toggle with F or ?fps */
      #fps { right: 12px; top: 12px; background: var(--panel); border: 1px solid var(--edge); border-radius: 8px;
        padding: 7px 10px 6px; font: 700 9px/1.4 var(--px); letter-spacing: .06em; color: var(--teal); text-align: right; white-space: pre; }
      #fps b { color: var(--lime); } #fps .bad { color: var(--pink); }

      #keys { left: 50%; bottom: 16px; transform: translateX(-50%); background: var(--panel); border: 1px solid var(--edge);
        border-radius: 10px; padding: 8px 14px 7px; font: 700 8px/1 var(--px); letter-spacing: .08em; color: var(--ink-faint); text-transform: uppercase; }
      #keys b { color: var(--lime); }

      /* cash / REP chip */
      #hud-stats { left: 14px; top: 56px; display: flex; gap: 14px; background: var(--panel); border: 1px solid var(--edge);
        border-radius: 10px; padding: 8px 12px 7px; font: 700 11px/1 var(--px); }
      #hud-stats .cash { color: var(--lime); } #hud-stats .rep { color: var(--teal); }

      /* interaction prompt (E to talk) */
      #prompt { left: 50%; bottom: 64px; transform: translateX(-50%); background: var(--panel); border: 1px solid var(--edge);
        border-radius: 10px; padding: 9px 14px 8px; font: 700 10px/1 var(--px); letter-spacing: .08em; color: var(--ink); text-transform: uppercase; }
      #prompt b { color: var(--lime); background: rgba(200,242,80,.12); border: 1px solid rgba(200,242,80,.5); border-radius: 5px; padding: 2px 6px 1px; margin-right: 8px; }

      /* toast + splash feedback */
      #toast { left: 50%; top: 18px; transform: translateX(-50%); background: var(--panel); border: 1px solid var(--edge); border-radius: 10px;
        padding: 10px 16px; font: 500 12.5px/1.4 var(--body); color: var(--ink); opacity: 0; transition: opacity .3s; max-width: 480px; text-align: center; }
      #toast.show { opacity: 1; } #toast b { color: var(--lime); }
      #splash { inset: 0; display: grid; place-items: center; background: radial-gradient(ellipse at center, rgba(10,4,24,0) 30%, rgba(10,4,24,.55)); opacity: 0; transition: opacity .25s; }
      #splash.show { opacity: 1; }
      #splash .big { font: 700 30px/1.2 var(--px); letter-spacing: .06em; color: var(--gold); text-align: center; text-shadow: 0 4px 0 rgba(0,0,0,.6), 0 0 42px rgba(255,207,107,.6); }
      #splash .sub { margin-top: 10px; font: 700 11px/1.6 var(--px); color: var(--ink); text-align: center; }
      #splash .sub em { font-style: normal; color: var(--teal); }

      /* ---------- mission scene: BRIEF → DECIDE → DRAFT → SEND (diegetic panel) ---------- */
      #scene { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end;
        background: linear-gradient(180deg, rgba(10,4,24,.6) 0%, rgba(10,4,24,0) 16%, rgba(10,4,24,0) 52%, rgba(10,4,24,.9) 100%); }
      #sc-panel { margin: 0 auto 22px; width: min(660px, calc(100% - 36px)); background: #140a24; border: 1px solid var(--edge); border-radius: 16px; padding: 16px; box-shadow: 0 18px 60px rgba(0,0,0,.55); }
      #sc-head { display: flex; gap: 12px; align-items: center; }
      #sc-portrait { width: 56px; height: 56px; border-radius: 10px; border: 1px solid var(--edge); image-rendering: pixelated; background: #241040; flex: none; }
      #sc-name { font: 700 12px/1 var(--px); color: var(--ink); }
      #sc-role { margin-top: 5px; font: 400 8px/1 var(--px); color: var(--ink-faint); letter-spacing: .1em; text-transform: uppercase; }
      #sc-channel { margin-left: auto; font: 700 7px/1 var(--px); letter-spacing: .12em; text-transform: uppercase; color: var(--teal); border: 1px solid rgba(45,225,194,.5); border-radius: 6px; padding: 4px 7px 3px; }
      #sc-steps { display: flex; gap: 6px; margin-top: 12px; }
      #sc-steps span { flex: 1; text-align: center; font: 700 7px/1 var(--px); letter-spacing: .12em; text-transform: uppercase; color: var(--ink-faint); border: 1px solid var(--edge); border-radius: 6px; padding: 5px 0 4px; }
      #sc-steps span.on { color: var(--lime); border-color: rgba(200,242,80,.6); background: rgba(200,242,80,.08); }
      #sc-steps span.done { color: var(--teal); border-color: rgba(45,225,194,.35); }
      #sc-steps span.done::before { content: "✓ "; }
      #sc-text { margin-top: 12px; min-height: 44px; font: 500 14px/1.6 var(--body); color: var(--ink); white-space: pre-wrap; }
      #sc-text .cursor, #draft-body .cursor { display: inline-block; width: 8px; height: 14px; background: var(--pink); vertical-align: -2px; animation: blink 0.9s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      #sc-options { margin-top: 14px; display: grid; gap: 8px; }
      #sc-options button { text-align: left; font: 500 13px/1.45 var(--body); color: var(--ink); background: rgba(255,255,255,.04); border: 1px solid var(--edge); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: border-color .12s, background .12s; }
      #sc-options button:hover { border-color: var(--pink); background: rgba(255,95,162,.08); }
      #sc-options button .pick { font: 700 8px/1 var(--px); color: var(--pink); margin-right: 8px; }
      #sc-options button.rec { border-color: rgba(200,242,80,.55); }
      #sc-options button.rec::after { content: "RECOMMENDED"; float: right; font: 700 7px/1.8 var(--px); letter-spacing: .1em; color: var(--lime); }
      #sc-options .own { border-style: dashed; color: var(--ink-dim); }
      #sc-draft { margin-top: 14px; }
      #draft-agent { display: flex; align-items: center; gap: 8px; font: 700 8px/1 var(--px); letter-spacing: .12em; text-transform: uppercase; color: var(--teal); }
      #draft-agent .spin { width: 8px; height: 8px; background: var(--teal); transform: rotate(45deg); animation: spin 1.1s linear infinite; }
      @keyframes spin { to { transform: rotate(405deg); } }
      #draft-paper { margin-top: 10px; background: #fdf6ec; color: #241626; border-radius: 10px; padding: 14px 16px; box-shadow: 0 8px 26px rgba(0,0,0,.4); cursor: pointer; }
      #draft-title { font: 600 12.5px/1.4 var(--body); color: #6b4a63; border-bottom: 1px solid #e8d9c8; padding-bottom: 8px; margin-bottom: 8px; }
      #draft-body { font: 500 13px/1.65 var(--body); white-space: pre-wrap; min-height: 60px; }
      #draft-actions { margin-top: 12px; display: flex; gap: 8px; }
      #draft-actions button { font: 700 9px/1 var(--px); letter-spacing: .1em; text-transform: uppercase; border-radius: 10px; padding: 11px 14px 10px; cursor: pointer; border: 1px solid var(--edge); background: none; color: var(--ink-dim); }
      #draft-actions .go { background: var(--lime); border-color: var(--lime); color: #1c2405; }
      #draft-actions .go:hover { filter: brightness(1.08); }
      #draft-actions button:not(.go):hover { color: var(--ink); border-color: var(--ink-dim); }
      #sc-hint { margin-top: 10px; font: 400 8px/1.6 var(--px); color: var(--ink-faint); letter-spacing: .06em; }
      #notes-row { margin-top: 10px; display: flex; gap: 8px; }
      #notes-in { flex: 1; background: rgba(255,255,255,.05); border: 1px solid var(--edge); border-radius: 10px; color: var(--ink); font: 500 12.5px/1.5 var(--body); padding: 8px 10px; resize: none; outline: none; }
      #notes-in:focus { border-color: var(--teal); }
      #notes-send { font: 700 8px/1.3 var(--px); letter-spacing: .08em; text-transform: uppercase; border-radius: 10px; padding: 0 12px; cursor: pointer; border: 1px solid rgba(45,225,194,.5); background: rgba(45,225,194,.1); color: var(--teal); }
    </style>
  </head>
  <body>
    <main id="stage">
      <canvas id="game"></canvas>
      <div class="hud" id="objective">Life is a Game · <b>step 1</b> — walk the block</div>
      <div class="hud" id="fps" hidden></div>
      <div class="hud" id="keys"><b>WASD</b> move &nbsp;·&nbsp; <b>SHIFT</b> run &nbsp;·&nbsp; <b>E</b> talk &nbsp;·&nbsp; <b>F</b> fps</div>
      <div class="hud" id="hud-stats"><span class="cash">$<span id="cash">0</span></span><span class="rep">REP <span id="rep">0</span></span></div>
      <div class="hud" id="prompt" hidden><b>E</b><span id="prompt-text"></span></div>
      <div class="hud" id="toast"></div>
      <div class="hud" id="splash" hidden><div><div class="big" id="splash-big">TASK CLOSED</div><div class="sub" id="splash-sub"></div></div></div>

      <div id="scene" hidden>
        <div id="sc-panel">
          <div id="sc-head">
            <canvas id="sc-portrait" width="16" height="16"></canvas>
            <div><div id="sc-name"></div><div id="sc-role"></div></div>
            <span id="sc-channel"></span>
          </div>
          <div id="sc-steps"><span class="on">brief</span><span>decide</span><span>draft</span><span>send</span></div>
          <div id="sc-text"></div>
          <div id="sc-options"></div>
          <div id="sc-draft" hidden>
            <div id="draft-agent"><span class="spin"></span><span id="draft-agent-text">your agent is drafting…</span></div>
            <div id="draft-paper"><div id="draft-title"></div><div id="draft-body"></div></div>
            <div id="draft-actions" hidden>
              <button class="go" id="draft-approve">✓ approve &amp; send</button>
              <button id="draft-tweak">↻ redraft</button>
              <button id="draft-notes">✎ notes</button>
              <button id="draft-cancel">esc</button>
            </div>
            <div id="notes-row" hidden>
              <textarea id="notes-in" rows="2" placeholder="direct the agent — “punchier”, “mention the MOQ risk”, anything"></textarea>
              <button id="notes-send">↳ redraft with notes</button>
            </div>
          </div>
          <div id="sc-hint" hidden>click the paper to skip the typing</div>
        </div>
      </div>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
